  const c = CAPTAINS[key];
  if (!c) return;
  const wallFallback = () => {
    track("wall_post_fallback", {
      captain: key
    });

    return;
  }

  try {
    const p = vkb.send("VKWebAppShowWallPostBox", {
      message: message,
      attachments: VK_APP_LINK
    });
    if (p && p.then) p.then(() => track("wall_post", {
      captain: key
    })).catch(wallFallback);
  } catch (e) {
    wallFallback();
  }
};
